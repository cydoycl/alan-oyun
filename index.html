@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{--sami:#378ADD;--emir:#4CAF50;--beko:#F59E0B;--space:#A855F7;}
body{background:#0a0a0a;color:#fff;font-family:'Inter',sans-serif;height:100vh;overflow:hidden;}

/* JOIN */
#screen-join{display:flex;position:fixed;inset:0;background:#0a0a0a;z-index:500;align-items:center;justify-content:center;flex-direction:column;gap:1.5rem;}
#screen-join h1{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:6px;}
.join-buttons{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:320px;}
.join-btn{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;padding:16px;border-radius:8px;border:2px solid;cursor:pointer;background:transparent;transition:opacity 0.15s;}
.join-btn:hover{opacity:0.75;}
.join-btn.sami{color:var(--sami);border-color:var(--sami);}
.join-btn.emir{color:var(--emir);border-color:var(--emir);}
.join-btn.beko{color:var(--beko);border-color:var(--beko);}
.join-btn.space{color:var(--space);border-color:var(--space);}
.join-btn:disabled{opacity:0.3;cursor:not-allowed;}

/* BOARD */
#screen-board{display:none;flex-direction:column;height:100vh;padding:12px;gap:8px;}
.top-bar{display:flex;justify-content:space-between;align-items:center;flex-shrink:0;gap:10px;}
.game-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:4px;flex-shrink:0;}
#turn-pill{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;padding:5px 14px;border-radius:999px;border:2px solid #333;color:#888;}
.players-bar{display:flex;gap:6px;}
.pchip{display:flex;align-items:center;gap:6px;background:#161616;border:1px solid #222;border-radius:999px;padding:4px 10px 4px 6px;font-size:11px;}
.pchip.my{border-width:2px;}
.pchip.active-turn{border-width:2px;}
.pchip .dot{width:8px;height:8px;border-radius:50%;}
.pchip .pname{font-weight:600;}
.pchip .psq{color:#888;}
.pchip .pas{color:#F59E0B;font-size:10px;margin-left:2px;}
.pchip.elim{opacity:0.3;}

/* BOARD LAYOUT */
.board-wrap{flex:1;display:flex;gap:8px;min-height:0;}
.side-labels{display:flex;flex-direction:column;gap:3px;width:108px;flex-shrink:0;}
.lgroup{display:flex;flex-direction:column;gap:3px;flex:1;}
.lbl{flex:1;display:flex;align-items:center;padding:0 7px;border-radius:4px;font-size:8px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lbl.dep{opacity:0.2;text-decoration:line-through;}
.side-labels-r .lbl{justify-content:flex-end;}

#game-grid{display:grid;grid-template-columns:repeat(8,1fr);grid-template-rows:repeat(8,1fr);gap:3px;flex:1;min-height:0;}
.cell{border-radius:3px;background:#161616;border:1px solid #1e1e1e;transition:background 0.3s,border-color 0.2s,transform 0.15s;position:relative;overflow:hidden;}
.cell.o-sami {background:#0d2a47;border-color:#1a4a78;}
.cell.o-emir {background:#0d2e0f;border-color:#1a5c1e;}
.cell.o-beko {background:#2e1f05;border-color:#5c3e0a;}
.cell.o-space{background:#1e0a2e;border-color:#3d1478;}
.cell.o-sami::after {content:'';position:absolute;inset:0;background:var(--sami);opacity:0.14;}
.cell.o-emir::after {content:'';position:absolute;inset:0;background:var(--emir);opacity:0.14;}
.cell.o-beko::after {content:'';position:absolute;inset:0;background:var(--beko);opacity:0.14;}
.cell.o-space::after{content:'';position:absolute;inset:0;background:var(--space);opacity:0.14;}
.cell.attackable{cursor:pointer;}
.cell.attackable:hover{transform:scale(1.07);border-color:#fff5 !important;z-index:2;}
.cell.targeted{border:2px solid #fff !important;animation:blink 1s infinite;}
@keyframes blink{0%,100%{border-color:#fff !important}50%{border-color:#fff3 !important}}
@keyframes cap{0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}
.cell.cap{animation:cap 0.4s ease;}

.action-bar{flex-shrink:0;display:flex;justify-content:center;align-items:center;gap:12px;min-height:36px;}
#action-lbl{font-size:13px;color:#888;}
.pas-btn{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;background:transparent;border:1px solid #444;color:#888;padding:6px 18px;border-radius:4px;cursor:pointer;}
.pas-btn:hover{border-color:#888;color:#fff;}
.pas-btn:disabled{opacity:0.3;cursor:not-allowed;}

/* QUESTION SCREEN */
#screen-q{display:none;position:fixed;inset:0;background:#0a0a0a;z-index:200;align-items:center;justify-content:center;flex-direction:column;padding:1.5rem;gap:0.9rem;}
#screen-q.open{display:flex;}

.battle-header{display:flex;align-items:center;gap:16px;}
.b-player{text-align:center;}
.b-av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:18px;margin:0 auto 3px;}
.b-player span{font-size:11px;color:#888;}
.b-vs{font-family:'Bebas Neue',sans-serif;font-size:24px;color:#333;}
.round-badge{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;padding:4px 12px;border-radius:999px;background:#1a1a1a;color:#888;}

/* TIMERS */
.timers{display:flex;flex-direction:column;gap:6px;width:540px;max-width:95vw;}
.timer-row{display:flex;align-items:center;gap:10px;}
.t-name{font-size:11px;width:52px;text-align:right;flex-shrink:0;}
.t-name.mine{color:#fff;font-weight:600;}
.t-bar-wrap{flex:1;height:7px;background:#222;border-radius:4px;overflow:hidden;}
.t-bar{height:100%;border-radius:4px;transition:width 0.9s linear;}
.t-num{font-family:'Bebas Neue',sans-serif;font-size:18px;width:30px;flex-shrink:0;text-align:right;}
.t-num.red{color:#EF4444;}

/* Q CARD */
.q-card{background:#111;border:1px solid #222;border-radius:12px;padding:1.25rem;width:580px;max-width:95vw;display:flex;gap:1rem;}
.q-img{flex-shrink:0;width:150px;height:150px;border-radius:7px;overflow:hidden;background:#1a1a1a;display:flex;align-items:center;justify-content:center;}
.q-img img{width:100%;height:100%;object-fit:cover;}
.q-body{flex:1;display:flex;flex-direction:column;gap:7px;}
.q-badge{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 9px;border-radius:4px;background:#1a1a1a;color:#888;align-self:flex-start;}
.q-whose{font-size:11px;font-weight:600;margin:0;}
.q-text{font-size:14px;font-weight:500;line-height:1.4;}
.q-opts{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:auto;}
.qo{background:#161616;border:1px solid #2a2a2a;border-radius:6px;padding:9px 11px;font-size:12px;color:#ccc;cursor:pointer;text-align:left;font-family:'Inter',sans-serif;transition:border-color 0.12s,background 0.12s;}
.qo:hover:not(:disabled){border-color:#555;background:#1e1e1e;}
.qo:disabled{cursor:default;}
.qo.correct{background:#0d2e0f;border-color:#4CAF50;color:#4CAF50;}
.qo.wrong{background:#2e0d0d;border-color:#EF4444;color:#EF4444;}
.qo.hi{background:#0d2e0f;border-color:#4CAF50;color:#4CAF50;}

.status-msg{font-size:13px;padding:0.75rem 1.25rem;border-radius:8px;text-align:center;width:540px;max-width:95vw;}
.status-msg.win{background:#0d2e0f;color:#4CAF50;}
.status-msg.lose{background:#2e0d0d;color:#EF4444;}
.status-msg.info{background:#1a1a1a;color:#888;}

#btn-continue{display:none;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;background:#fff;color:#000;border:none;padding:9px 28px;border-radius:6px;cursor:pointer;}

/* WINNER */
#screen-win{display:none;position:fixed;inset:0;background:#0a0a0a;z-index:300;align-items:center;justify-content:center;flex-direction:column;text-align:center;}

#screen-win p{color:#888;font-size:14px;margin-bottom:2rem;}
#screen-win button{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:3px;background:#fff;color:#000;border:none;padding:10px 36px;border-radius:6px;cursor:pointer;}

// ── Constants ──
const COLORS={sami:'#378ADD',emir:'#4CAF50',beko:'#F59E0B',space:'#A855F7'};
const COLS=8,ROWS=8,TOTAL=COLS*ROWS;
const TURN_ORDER=['sami','emir','beko','space'];
const MAX_TIME=45;
const PLAYER_DEFS=[
  {id:'sami', name:'Sami', color:COLORS.sami, cats:['Anime karakterleri','Satranç oyuncuları','İnternet memeleri','İngilizce'], cols:[0,1,2,3], rowOffset:0},
  {id:'emir', name:'Emir', color:COLORS.emir, cats:['Bilgisayar bileşenleri','Bilgisayar oyunları','Türk popçular','Filmler'],  cols:[4,5,6,7], rowOffset:0},
  {id:'beko', name:'Beko', color:COLORS.beko, cats:['Eurovision şarkıları','Esport takımları','Fenerli futbolcular','Sitcomlar'],cols:[0,1,2,3], rowOffset:4},
  {id:'space',name:'Space',color:COLORS.space,cats:['Marka logoları','Yabancı diziler','Yabancı şarkıcılar','Futbol takımları'],cols:[4,5,6,7], rowOffset:4},
];

// ── Local state ──
let myId=null;
let gs=null; // latest game state from Firebase
let localTimer=null;
let localTimeLeft=MAX_TIME;
let gridBuilt=false;

// ── Helpers ──
function pd(id){return PLAYER_DEFS.find(p=>p.id===id);}

function buildSquares(pid){
  const p=pd(pid),sq=[];
  for(let ci=0;ci<4;ci++){
    const r=p.rowOffset+ci;
    for(const c of p.cols) sq.push(r*COLS+c);
  }
  return sq;
}

function getCatOfCell(defId,cellIdx){
  const p=pd(defId);
  for(let ci=0;ci<p.cats.length;ci++){
    const r=p.rowOffset+ci;
    const cells=p.cols.map(c=>r*COLS+c);
    if(cells.includes(cellIdx)) return p.cats[ci];
  }
  return null;
}

function getOwner(state,ci){
  for(const pid of TURN_ORDER){
    if(state.squares&&state.squares[pid]&&state.squares[pid].includes(ci)) return pid;
  }
  return null;
}

function isCatDepleted(state,cat){
  return state.usedQ&&state.usedQ[cat]&&state.usedQ[cat].length>=(QUESTIONS[cat]||[]).length;
}

function pickQIdx(state,cat){
  const all=QUESTIONS[cat]||[];
  const used=(state.usedQ&&state.usedQ[cat])||[];
  const avail=all.map((_,i)=>i).filter(i=>!used.includes(i));
  if(!avail.length)return null;
  return avail[Math.floor(Math.random()*avail.length)];
}

function nextTurn(state){
  const alive=TURN_ORDER.filter(p=>!state.eliminated[p]);
  if(!alive.length)return null;
  const i=alive.indexOf(state.currentTurn);
  return alive[(i+1)%alive.length];
}

// ── Init state ──
function buildInitialState(){
  const squares={},eliminated={},usedQ={};
  for(const p of PLAYER_DEFS){
    squares[p.id]=buildSquares(p.id);
    eliminated[p.id]=false;
  }
  Object.keys(QUESTIONS).forEach(k=>usedQ[k]=[]);
  return{squares,eliminated,usedQ,currentTurn:'sami',phase:'pick',battle:null};
}

// ── Join ──
function joinAs(pid){
  myId=pid;
  document.getElementById('screen-join').style.display='none';
  document.getElementById('screen-board').style.display='flex';
  gRef.once('value',snap=>{
    if(!snap.exists()) gRef.set(buildInitialState());
    listenGame();
  });
}

// ── Listen ──
function listenGame(){
  gRef.on('value',snap=>{
    const state=snap.val();
    if(!state)return;
    gs=state;
    render(state);
  });
}

// ── Render ──
function render(state){
  renderBoard(state);
  renderLabels(state);
  renderPlayersBar(state);
  renderTurnPill(state);

  if(state.phase==='pick')       showPickPhase(state);
  else if(state.phase==='battle') showBattlePhase(state);
  else if(state.phase==='result') showResultPhase(state);
  else if(state.phase==='gameover') showGameOver(state);
}

function renderBoard(state){
  const g=document.getElementById('game-grid');
  if(!gridBuilt){
    g.innerHTML='';
    for(let i=0;i<TOTAL;i++){
      const c=document.createElement('div');
      c.className='cell';c.id='c'+i;
      g.appendChild(c);
    }
    gridBuilt=true;
  }
  for(let i=0;i<TOTAL;i++){
    const el=document.getElementById('c'+i);
    const owner=getOwner(state,i);
    el.className='cell'+(owner?' o-'+owner:'');
    el.onclick=null;
    el.title='';

    // Show targeted cell
    if(state.battle&&state.battle.cellId===i){
      el.classList.add('targeted');
    }

    // In pick phase: highlight attackable cells for current turn player
    if(state.phase==='pick'&&state.currentTurn===myId&&owner&&owner!==myId){
      const cat=getCatOfCell(owner,i);
      if(cat&&!isCatDepleted(state,cat)){
        el.classList.add('attackable');
        el.title=cat;
        el.onclick=(()=>{const c=i,o=owner;return()=>doAttack(state,c,o);})();
      }
    }
  }
}

function renderLabels(state){
  const mk=(pid,right)=>{
    const p=pd(pid);
    const grp=document.createElement('div');
    grp.className='lgroup';
    p.cats.forEach(cat=>{
      const el=document.createElement('div');
      el.className='lbl'+(isCatDepleted(state,cat)?' dep':'');
      el.style.background=p.color+'20';el.style.color=p.color;
      if(!right)el.style.borderLeft='3px solid '+p.color;
      else el.style.borderRight='3px solid '+p.color;
      el.textContent=cat;el.title=cat;
      grp.appendChild(el);
    });
    return grp;
  };
  const l=document.getElementById('labels-l');l.innerHTML='';
  l.appendChild(mk('sami',false));l.appendChild(mk('beko',false));
  const r=document.getElementById('labels-r');r.innerHTML='';
  r.appendChild(mk('emir',true));r.appendChild(mk('space',true));
}

function renderPlayersBar(state){
  const b=state.battle;
  document.getElementById('players-bar').innerHTML=TURN_ORDER.map(pid=>{
    const p=pd(pid);
    const sq=(state.squares[pid]||[]).length;
    // pas hakkı sadece aktif savaşta göster
    let pasStr='';
    if(b&&(pid===b.attacker||pid===b.defender)){
      const pas=(b.passes&&b.passes[pid]!=null)?b.passes[pid]:2;
      pasStr=`<span class="pas" title="Pas hakkı">P:${pas}</span>`;
    }
    const isActive=state.currentTurn===pid&&state.phase==='pick';
    return`<div class="pchip${pid===myId?' my':''}${state.eliminated[pid]?' elim':''}${isActive?' active-turn':''}"
      style="${isActive||pid===myId?'border-color:'+p.color+';border-width:2px':''}">
      <div class="dot" style="background:${p.color}"></div>
      <span class="pname">${p.name}${pid===myId?' ★':''}</span>
      <span class="psq">${sq}k</span>
      ${pasStr}
    </div>`;
  }).join('');
}

function renderTurnPill(state){
  const pill=document.getElementById('turn-pill');
  if(state.phase==='gameover'){pill.textContent='Oyun bitti';return;}
  const p=pd(state.currentTurn);
  pill.style.color=p.color;pill.style.borderColor=p.color;
  if(state.phase==='pick'){
    pill.textContent=state.currentTurn===myId?'SENİN SIRAN!':p.name.toUpperCase()+"'IN SIRASI";
  } else if(state.phase==='battle'||state.phase==='result'){
    const b=state.battle;
    pill.textContent=`Soru ${b.roundNum} — ${pd(b.asker).name} ↔ ${pd(b.defender).name}`;
  }
}

// ── Pick phase ──
function showPickPhase(state){
  document.getElementById('screen-q').classList.remove('open');
  document.getElementById('screen-win').classList.remove('open');
  stopTimer();

  const lbl=document.getElementById('action-lbl');
  const pasbtn=document.getElementById('btn-pas');

  if(state.currentTurn===myId){
    lbl.textContent='Rakip bir kareye tıkla ve saldır!';
    lbl.style.color='#fff';
    pasbtn.style.display='none'; // pick aşamasında pas yok
  } else {
    lbl.textContent=pd(state.currentTurn).name+' saldırı seçiyor...';
    lbl.style.color='#888';
    pasbtn.style.display='none';
  }
}

function usePas(){
  if(!gs||gs.phase!=='battle')return;
  const b=gs.battle;
  if(b.asker!==myId)return; // sadece şu an sorulan pas yapabilir
  const passes=b.passes||{};
  const myPas=(passes[myId]!=null)?passes[myId]:2;
  if(myPas<=0){alert('Bu savaşta pas hakkın kalmadı!');return;}

  // Pas: soru kullanılmış say, sırayı karşı tarafa ver, yeni soru çek
  const qIdx=pickQIdx(gs,b.category);
  if(qIdx==null){alert('Soru kalmadı!');return;}

  const newUsedQ=JSON.parse(JSON.stringify(gs.usedQ||{}));
  if(!newUsedQ[b.category])newUsedQ[b.category]=[];
  newUsedQ[b.category].push(b.questionIdx); // eskisini de kullanılmış say
  newUsedQ[b.category].push(qIdx);

  const nextAsker=b.asker===b.attacker?b.defender:b.attacker;
  const newPasses={...passes,[myId]:myPas-1};

  // Reset only the NEW asker's timer; other player's timer is preserved
  const timerReset = nextAsker===b.attacker
    ? {attTimeLeft:MAX_TIME}
    : {defTimeLeft:MAX_TIME};
  const newBattle={
    ...b,
    asker:nextAsker,
    questionIdx:qIdx,
    roundNum:b.roundNum+1,
    questionStartTime:Date.now(),
    answer:null,
    answered:false,
    passes:newPasses,
    ...timerReset,
  };
  gRef.update({battle:newBattle,usedQ:newUsedQ});
}

// ── Attack ──
function doAttack(state,cellIdx,defId){
  if(state.currentTurn!==myId||state.phase!=='pick')return;
  const cat=getCatOfCell(defId,cellIdx);
  if(!cat||isCatDepleted(state,cat)){alert('Bu kategorinin soruları bitti!');return;}
  const qIdx=pickQIdx(state,cat);
  if(qIdx==null){alert('Soru kalmadı!');return;}

  const newUsedQ=JSON.parse(JSON.stringify(state.usedQ||{}));
  if(!newUsedQ[cat])newUsedQ[cat]=[];
  newUsedQ[cat].push(qIdx);

  // Battle: asker = saldıran (currentTurn), defender = hedef
  const now=Date.now();
  const battle={
    attacker:myId,
    asker:myId,
    defender:defId,
    category:cat,
    questionIdx:qIdx,
    cellId:cellIdx,
    roundNum:1,
    startTime:now,
    questionStartTime:now,
    attTimeLeft:MAX_TIME,
    defTimeLeft:MAX_TIME,
    answer:null,
    answered:false,
    eliminated:null,
    passes:{[myId]:2,[defId]:2},
  };

  gRef.update({phase:'battle',battle,usedQ:newUsedQ});
}

// ── Battle phase ──
function showBattlePhase(state){
  const b=state.battle;
  if(!b)return;
  const q=QUESTIONS[b.category][b.questionIdx];
  const askerPd=pd(b.asker),defPd=pd(b.defender);
  const amAsker=myId===b.asker,amDef=myId===b.defender;
  const iAmInBattle=amAsker||amDef;

  document.getElementById('screen-q').classList.add('open');
  document.getElementById('btn-continue').style.display='none';
  document.getElementById('status-msg').style.display='none';

  // Header
  const setAv=(elId,p)=>{const el=document.getElementById(elId);el.style.cssText=`background:${p.color}33;color:${p.color};border:2px solid ${p.color}`;el.textContent=p.name[0];};
  setAv('av-q',pd(b.attacker));setAv('av-d',defPd);
  document.getElementById('name-q').textContent=pd(b.attacker).name;
  document.getElementById('name-d').textContent=defPd.name;
  document.getElementById('round-badge').textContent='TUR '+b.roundNum;

  // Q
  document.getElementById('q-cat').textContent=b.category;
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('q-whose').textContent=`📢 ${pd(b.asker).name}'ın sorusu`;
  document.getElementById('q-whose').style.color=pd(b.asker).color;

  const imgEl=document.getElementById('q-img');
  const errEl=document.getElementById('q-img-err');
  imgEl.style.display='none';
  errEl.style.display='flex';
  errEl.textContent='⏳';
  loadImage(q.img, imgEl, errEl);

  // Timers
  const attPd=pd(b.attacker);
  document.getElementById('t-q-name').textContent=attPd.name;
  document.getElementById('t-q-name').className='t-name'+(b.attacker===myId?' mine':'');
  document.getElementById('t-q-bar').style.background=attPd.color;
  document.getElementById('t-d-name').textContent=defPd.name;
  document.getElementById('t-d-name').className='t-name'+(b.defender===myId?' mine':'');
  document.getElementById('t-d-bar').style.background=defPd.color;

  // Each player has their OWN 45s timer stored in battle
  // attTimeLeft and defTimeLeft stored in Firebase, decremented locally
  const attLeft = (b.attTimeLeft != null) ? b.attTimeLeft : MAX_TIME;
  const defLeft = (b.defTimeLeft != null) ? b.defTimeLeft : MAX_TIME;
  updateTimerBar('t-q', attLeft);
  updateTimerBar('t-d', defLeft);

  // Options — only if it's my turn to answer
  const optsEl=document.getElementById('q-opts');
  const pasbtn=document.getElementById('btn-pas');
  if(amAsker&&!b.answered){
    optsEl.innerHTML=q.options.map((o,i)=>`
      <button class="qo" onclick="submitBattleAnswer(${i})">${String.fromCharCode(65+i)}. ${o}</button>`).join('');
    // Pas butonu
    const myPas=(b.passes&&b.passes[myId]!=null)?b.passes[myId]:2;
    pasbtn.style.display='inline-block';
    pasbtn.disabled=myPas<=0;
    pasbtn.textContent=`PAS (${myPas} hak)`;
    // My timer: use my stored timeLeft from Firebase, or MAX_TIME if first question
    const myTimeLeft = amAsker && b.asker === b.attacker
      ? (b.attTimeLeft != null ? b.attTimeLeft : MAX_TIME)
      : (b.defTimeLeft != null ? b.defTimeLeft : MAX_TIME);
    startTimer(myTimeLeft, ()=>submitBattleAnswer(-1));
  } else {
    optsEl.innerHTML=q.options.map((o,i)=>`
      <button class="qo" disabled>${String.fromCharCode(65+i)}. ${o}</button>`).join('');
    pasbtn.style.display='none';
    stopTimer();
    if(!amAsker&&iAmInBattle){
      const sm=document.getElementById('status-msg');
      sm.style.display='block';sm.className='status-msg info';
      sm.textContent=`${pd(b.asker).name} cevaplıyor, bekle...`;
    }
  }
}

const imgCache={};
const TMDB_KEY='cb20b6f48957638741a5c3de42fc0b9e';

function loadImage(imgObj,imgEl,errEl){
  imgEl.style.display='none';errEl.style.display='flex';errEl.textContent='⏳';
  if(!imgObj){errEl.textContent='🖼️';return;}
  const key=JSON.stringify(imgObj);
  if(imgCache[key]){imgEl.src=imgCache[key];imgEl.style.display='block';errEl.style.display='none';return;}
  const setImg=(url)=>{
    imgCache[key]=url;
    imgEl.src=url;
    imgEl.onload=()=>{imgEl.style.display='block';errEl.style.display='none';};
    imgEl.onerror=()=>{errEl.textContent='🖼️';};
  };
  if(imgObj.type==='clearbit'){
    setImg('https://logo.clearbit.com/'+imgObj.domain);
  } else if(imgObj.type==='imgflip'){
    setImg(imgObj.url);
  } else if(imgObj.type==='jikan'){
    fetch('https://api.jikan.moe/v4/characters/'+imgObj.id)
      .then(r=>r.json()).then(d=>{
        const u=d.data&&d.data.images&&(d.data.images.jpg.image_url||d.data.images.webp.image_url);
        if(u)setImg(u);else errEl.textContent='🖼️';
      }).catch(()=>errEl.textContent='🖼️');
  } else if(imgObj.type==='tmdb_movie'){
    fetch('https://api.themoviedb.org/3/movie/'+imgObj.id+'?api_key='+TMDB_KEY)
      .then(r=>r.json()).then(d=>{
        if(d.poster_path)setImg('https://image.tmdb.org/t/p/w300'+d.poster_path);
        else errEl.textContent='🖼️';
      }).catch(()=>errEl.textContent='🖼️');
  } else if(imgObj.type==='tmdb_tv'){
    fetch('https://api.themoviedb.org/3/tv/'+imgObj.id+'?api_key='+TMDB_KEY)
      .then(r=>r.json()).then(d=>{
        if(d.poster_path)setImg('https://image.tmdb.org/t/p/w300'+d.poster_path);
        else errEl.textContent='🖼️';
      }).catch(()=>errEl.textContent='🖼️');
  } else if(imgObj.type==='tmdb_person'){
    fetch('https://api.themoviedb.org/3/person/'+imgObj.id+'/images?api_key='+TMDB_KEY)
      .then(r=>r.json()).then(d=>{
        const p=d.profiles&&d.profiles[0];
        if(p)setImg('https://image.tmdb.org/t/p/w300'+p.file_path);
        else errEl.textContent='🖼️';
      }).catch(()=>errEl.textContent='🖼️');
  } else if(imgObj.type==='wiki'){
    const fname=imgObj.file;
    const tryAPI=(api)=>fetch(api+'?action=query&titles=File:'+encodeURIComponent(fname)+'&prop=imageinfo&iiprop=url&iiurlwidth=300&format=json&origin=*')
      .then(r=>r.json()).then(d=>{
        const pages=d.query&&d.query.pages;
        if(!pages)return null;
        const page=Object.values(pages)[0];
        const info=page.imageinfo&&page.imageinfo[0];
        return(info&&(info.thumburl||info.url))||null;
      }).catch(()=>null);
    tryAPI('https://commons.wikimedia.org/w/api.php')
      .then(u=>u||tryAPI('https://en.wikipedia.org/w/api.php'))
      .then(u=>{if(u)setImg(u);else errEl.textContent='🖼️';});
  } else {
    errEl.textContent='🖼️';
  }
}


function updateTimerBar(prefix,left){
  const num=document.getElementById(prefix+'-num');
  const bar=document.getElementById(prefix+'-bar');
  num.textContent=left;
  num.style.opacity='1';
  num.className='t-num'+(left<=10?' red':'');
  bar.style.width=(left/MAX_TIME*100)+'%';
}

function startTimer(from,onEnd){
  stopTimer();
  localTimeLeft=from;
  // Determine which Firebase key to update (attTimeLeft or defTimeLeft)
  const amAtt=myId===gs.battle.attacker;
  const fbKey='battle/'+(amAtt?'attTimeLeft':'defTimeLeft');
  const displayPrefix=amAtt?'t-q':'t-d';
  localTimer=setInterval(()=>{
    if(!gs||!gs.battle||gs.phase!=='battle'){stopTimer();return;}
    localTimeLeft=Math.max(0,localTimeLeft-1);
    updateTimerBar(displayPrefix,localTimeLeft);
    // Push to Firebase every 5s or on timeout
    if(localTimeLeft%5===0||localTimeLeft===0){
      const update={};
      update[fbKey]=localTimeLeft;
      gRef.update(update);
    }
    if(localTimeLeft===0){stopTimer();onEnd();}
  },1000);
}

function stopTimer(){
  if(localTimer){clearInterval(localTimer);localTimer=null;}
}

// ── Submit answer ──
function submitBattleAnswer(idx){
  stopTimer();
  if(!gs||gs.phase!=='battle')return;
  const b=gs.battle;
  if(b.answered)return;
  if(b.asker!==myId)return;

  const q=QUESTIONS[b.category][b.questionIdx];
  const correct=idx===q.answer;

  if(!correct){
    // Lost! transfer cell
    finishBattle(gs,'loser',myId);
  } else {
    // Correct — next round: swap asker
    nextBattleRound(gs);
  }
}

function nextBattleRound(state){
  const b=state.battle;
  const nextAsker=b.asker===b.attacker?b.defender:b.attacker;
  const qIdx=pickQIdx(state,b.category);
  if(qIdx==null){
    // No more questions in category — draw, cell stays
    finishBattle(state,'draw',null);
    return;
  }
  const newUsedQ=JSON.parse(JSON.stringify(state.usedQ||{}));
  if(!newUsedQ[b.category])newUsedQ[b.category]=[];
  newUsedQ[b.category].push(qIdx);

  const newBattle={
    ...b,
    asker:nextAsker,
    questionIdx:qIdx,
    roundNum:b.roundNum+1,
    startTime:Date.now(),
    answer:null,
    answered:false,
  };
  gRef.update({battle:newBattle,usedQ:newUsedQ});
}

function finishBattle(state,outcome,loserId){
  const b=state.battle;
  const newSquares=JSON.parse(JSON.stringify(state.squares));
  let resultText='';

  if(outcome==='loser'&&loserId){
    // loserId loses the cell
    if(loserId===b.defender){
      // attacker wins
      newSquares[b.defender]=newSquares[b.defender].filter(c=>c!==b.cellId);
      newSquares[b.attacker].push(b.cellId);
      resultText=`${pd(b.attacker).name} kareyi aldı!`;
    } else {
      // defender wins (attacker failed)
      resultText=`${pd(b.defender).name} kareyi korudu!`;
    }
  } else {
    resultText='Berabere — kare değişmedi.';
  }

  // Check elimination
  const newElim=JSON.parse(JSON.stringify(state.eliminated));
  for(const pid of TURN_ORDER){
    if(!newElim[pid]&&(newSquares[pid]||[]).length===0) newElim[pid]=true;
  }
  const alive=TURN_ORDER.filter(p=>!newElim[p]);

  const newBattle={...b,outcome,loserId,resultText,answered:true};
  gRef.update({
    squares:newSquares,
    eliminated:newElim,
    battle:newBattle,
    phase:alive.length<=1?'gameover':'result',
  });
}

// ── Result phase ──
function showResultPhase(state){
  const b=state.battle;
  if(!b)return;
  const q=QUESTIONS[b.category][b.questionIdx];
  stopTimer();

  document.getElementById('screen-q').classList.add('open');
  document.getElementById('status-msg').style.display='none';
  document.getElementById('btn-continue').style.display='none';

  // Reveal answer in opts
  document.getElementById('q-opts').innerHTML=q.options.map((o,i)=>`
    <button class="qo${i===q.answer?' correct':''}" disabled>${String.fromCharCode(65+i)}. ${o}</button>`).join('');

  const sm=document.getElementById('status-msg');
  sm.style.display='block';
  const iWon=(b.loserId&&b.loserId!==myId)||(b.outcome==='draw');
  const iLost=b.loserId===myId;
  sm.className='status-msg'+(iLost?' lose':iWon?' win':' info');
  sm.textContent=b.resultText||'Sonuç bekleniyor...';

  // Only attacker shows continue
  if(myId===b.attacker){
    document.getElementById('btn-continue').style.display='inline-block';
  }
}

function continueAfterRound(){
  if(!gs)return;
  const next=nextTurn(gs);
  gRef.update({phase:'pick',battle:null,currentTurn:next});
}

// ── Game over ──
function showGameOver(state){
  stopTimer();
  document.getElementById('screen-q').classList.remove('open');
  const winner=TURN_ORDER.find(pid=>!state.eliminated[pid]);
  if(!winner)return;
  const p=pd(winner);
  document.getElementById('win-name').textContent=p.name+' kazandı!';
  document.getElementById('win-name').style.color=p.color;
  document.getElementById('win-sub').textContent=(state.squares[winner]||[]).length+' kare ile oyunu bitirdi.';
  document.getElementById('screen-win').classList.add('open');
}

function resetGame(){
  document.getElementById('screen-win').classList.remove('open');
  gridBuilt=false;
  gRef.set(buildInitialState());
}

function confirmReset(){
  if(confirm('Oyunu sıfırlamak istediğine emin misin? Herkes için sıfırlanır.')) resetGame();
}
